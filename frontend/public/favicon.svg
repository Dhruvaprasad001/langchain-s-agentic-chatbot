<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="16" fill="url(#bg)" opacity="0.3"/>

  <!-- Sparkle / 4-pointed star centered at 32,32 -->
  <!-- Vertical bar -->
  <path d="M32 10 C32 10 33.5 24 34.5 32 C35.5 40 32 54 32 54 C32 54 30.5 40 29.5 32 C28.5 24 32 10 32 10Z" fill="url(#spark)"/>
  <!-- Horizontal bar -->
  <path d="M10 32 C10 32 24 30.5 32 29.5 C40 28.5 54 32 54 32 C54 32 40 33.5 32 34.5 C24 35.5 10 32 10 32Z" fill="url(#spark)"/>
  <!-- Diagonal top-right / bottom-left (smaller) -->
  <path d="M44 20 C44 20 37 27.5 34.2 30.5 C31.4 33.5 20 44 20 44 C20 44 27 36.5 29.8 33.5 C32.6 30.5 44 20 44 20Z" fill="url(#spark)" opacity="0.55"/>
  <!-- Diagonal top-left / bottom-right (smaller) -->
  <path d="M20 20 C20 20 27 27.5 29.8 30.5 C32.6 33.5 44 44 44 44 C44 44 37 36.5 34.2 33.5 C31.4 30.5 20 20 20 20Z" fill="url(#spark)" opacity="0.55"/>
</svg>
